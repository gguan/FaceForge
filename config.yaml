# FaceForge project configuration
# All values here are defaults. CLI flags (--device, --debug, --subject) always take precedence.
# Based on pixel3dmm multi-image tracking recommended settings.

# ── Stage 1 ──────────────────────────────────────────────────────────────────
stage1:
  align_scale_factor: 1.3        # flame-head-tracker standard
  align_output_size: 512
  aggregation_method: median     # median | mean

# ── Stage 2 ──────────────────────────────────────────────────────────────────
stage2:
  render_size: 512

  # Optimization steps per stage (0 = skip)
  # pixel3dmm: optimize_camera=500 (first half lmk, second half UV)
  #            optimize_color=500  (= medium)
  # We give each sub-stage its own 500 steps for thorough convergence.
  coarse_lmk_steps: 500
  coarse_uv_steps: 500
  medium_steps: 500
  fine_pca_steps: 0
  fine_detail_steps: 0
  enable_fine_detail: false

  # Learning rates (ref: pixel3dmm tracking.yaml)
  lr_shape: 0.002
  lr_expression: 0.005
  lr_R: 0.005
  lr_jaw: 0.005
  lr_translation: 0.001
  lr_focal: 0.02
  lr_texture: 0.005
  lr_lighting: 0.01
  lr_texture_disp: 0.001

  # Loss weights (ref: pixel3dmm tracking.yaml + tracker.py)
  # Landmark: eye contour ×5=5000, eye_closure ×500=500000, iris ×50=50000
  w_lmks: 1000.0
  w_lmks_lid: 1000.0
  w_lmks_iris: 1000.0
  w_lmk_camera: 3000.0
  # Dense losses
  w_pixel3dmm_uv: 2000.0
  w_normal: 1000.0
  w_sil: 500.0
  w_contour: 0.0
  w_region_weight: 0.0
  w_photometric: 0.0
  w_identity: 0.0
  # Mirror symmetry (pixel3dmm: 5000)
  w_mirror: 5000.0
  w_eye_sym: 0.1
  w_prdl: 0.0

  # Regularization (ref: pixel3dmm tracking.yaml)
  w_reg_shape_to_mica: 0.2
  w_reg_shape_to_zero: 0.05
  w_reg_expression: 0.05
  w_reg_jaw: 0.01
  w_reg_sh_mono: 0.0
  w_reg_tex_tv: 0.0

  # UV correspondence thresholds
  uv_delta_coarse: 0.00005
  uv_dist_coarse: 15.0
  uv_delta_fine: 0.00002
  uv_dist_fine: 8.0

  # Normal loss
  normal_delta_threshold: 0.33
  normal_eye_dilate_kernel: 13

  # LR decay milestones (fraction of total steps per stage)
  lr_decay_milestones: [0.5, 0.75, 0.9]

  # Gradient safety
  use_nan_guard: true
  focal_length_min: 1.5
  focal_length_max: 8.0

  # Occlusion filter
  use_occlusion_filter: true
  occlusion_depth_eps: 0.01

  # Early stopping
  use_early_stopping: true
  early_stopping_window: 10
  early_stopping_delta: 1.0e-5

  # Multi-image optimization
  multi_image_batch_size: 4
  sequential_coarse_steps: 100
  sequential_medium_steps: 200
  global_lr_scale: 0.1
